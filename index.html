<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DAREK — Luxury Real Estate Egypt</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;600;700;800&family=Noto+Kufi+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/*═══ FOUNDATION ═══*/
:root{
  --c1:#0C0C0E;--c2:#141417;--c3:#1C1C21;--c4:#26262D;--c5:#35353E;
  --gold:#B8963E;--gold2:#D4B263;--gold3:#F0D68A;--gold-a:rgba(184,150,62,.12);
  --w:#F2EDE4;--w2:#C8C0B4;--w3:#8A8278;--w4:#5C574F;
  --serif:'Instrument Serif','Noto Kufi Arabic',serif;
  --sans:'Syne','Noto Kufi Arabic',sans-serif;
  --ease:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:var(--sans);background:var(--c1);color:var(--w);-webkit-font-smoothing:antialiased;cursor:default;overflow-x:hidden}
body[dir="rtl"]{font-family:'Noto Kufi Arabic','Syne',sans-serif}
::selection{background:var(--gold);color:var(--c1)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--c1)}::-webkit-scrollbar-thumb{background:var(--gold);border-radius:4px}
a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:inherit;border:none;background:none;color:inherit}

/*═══ CUSTOM CURSOR ═══*/
.cursor{width:20px;height:20px;border:1.5px solid var(--gold);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transition:width .3s var(--ease),height .3s var(--ease),border .3s;mix-blend-mode:difference;transform:translate(-50%,-50%)}
.cursor.hover{width:60px;height:60px;border-color:var(--gold3);background:rgba(184,150,62,.06)}
@media(max-width:768px){.cursor{display:none}}

/*═══ GRAIN ═══*/
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/*═══ LOADER ═══*/
.loader{position:fixed;inset:0;background:var(--c1);z-index:10000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;transition:opacity .8s var(--ease),visibility .8s}
.loader.hide{opacity:0;visibility:hidden}
.loader-bar{width:200px;height:1px;background:var(--c4);position:relative;overflow:hidden}
.loader-fill{position:absolute;top:0;left:0;height:100%;background:var(--gold);animation:load 2s var(--ease) forwards}
@keyframes load{to{width:100%}}
.loader-text{font-family:var(--serif);font-size:14px;color:var(--w3);letter-spacing:6px;text-transform:uppercase}

/*═══ HEADER ═══*/
.hd{position:fixed;top:0;left:0;right:0;z-index:500;padding:24px 48px;display:flex;align-items:center;justify-content:space-between;transition:all .5s var(--ease)}
.hd.solid{padding:16px 48px;background:rgba(12,12,14,.92);backdrop-filter:blur(30px) saturate(1.5);border-bottom:1px solid rgba(184,150,62,.06)}
.hd-logo{font-family:var(--serif);font-size:28px;font-weight:400;letter-spacing:8px;color:var(--gold2);transition:var(--ease) .3s}
.hd-logo span{font-style:italic;color:var(--w)}
.hd-nav{display:flex;align-items:center;gap:32px}
.hd-link{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:var(--w3);position:relative;padding:4px 0;transition:color .3s}
.hd-link::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:1px;background:var(--gold);transition:width .4s var(--ease)}
.hd-link:hover,.hd-link.on{color:var(--w)}
.hd-link:hover::after,.hd-link.on::after{width:100%}
.hd-lang{font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:8px 20px;border:1px solid var(--c5);color:var(--w3);transition:all .3s}
.hd-lang:hover{border-color:var(--gold);color:var(--gold)}
.hd-menu{display:none;flex-direction:column;gap:4px;padding:8px;cursor:pointer}
.hd-menu span{width:24px;height:1.5px;background:var(--w);transition:var(--ease) .3s}

/*═══ MOBILE NAV ═══*/
.mnav{position:fixed;inset:0;background:var(--c1);z-index:600;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;opacity:0;visibility:hidden;transition:all .5s var(--ease)}
.mnav.open{opacity:1;visibility:visible}
.mnav .hd-link{font-size:24px;letter-spacing:5px}
.mnav-close{position:absolute;top:24px;right:24px;font-size:32px;color:var(--w3)}

/*═══ HERO — CINEMATIC ═══*/
.hero{height:100vh;position:relative;display:flex;align-items:flex-end;overflow:hidden}
.hero-bg{position:absolute;inset:0}
.hero-gradient{position:absolute;inset:0;background:
  radial-gradient(ellipse at 30% 20%,rgba(184,150,62,.07) 0%,transparent 50%),
  radial-gradient(ellipse at 70% 80%,rgba(184,150,62,.04) 0%,transparent 40%),
  linear-gradient(180deg,rgba(12,12,14,.2) 0%,rgba(12,12,14,.1) 40%,rgba(12,12,14,.85) 75%,var(--c1) 100%)
}
.hero-grid{position:absolute;inset:0;background-image:
  linear-gradient(rgba(184,150,62,.03) 1px,transparent 1px),
  linear-gradient(90deg,rgba(184,150,62,.03) 1px,transparent 1px);
  background-size:80px 80px;animation:gridMove 40s linear infinite}
@keyframes gridMove{to{background-position:80px 80px}}
.hero-lines{position:absolute;top:0;left:50%;transform:translateX(-50%);width:1px;height:100%;background:linear-gradient(transparent,rgba(184,150,62,.08) 30%,rgba(184,150,62,.08) 70%,transparent)}
.hero-line2{left:25%}.hero-line3{left:75%}

.hero-content{position:relative;z-index:2;padding:0 80px 100px;width:100%;max-width:1600px;margin:0 auto}
.hero-eyebrow{display:inline-flex;align-items:center;gap:12px;margin-bottom:28px;opacity:0;animation:slideUp .8s var(--ease) .5s forwards}
.hero-eyebrow::before{content:'';width:40px;height:1px;background:var(--gold)}
.hero-eyebrow span{font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold)}
.hero-h1{font-family:var(--serif);font-size:clamp(48px,7vw,96px);font-weight:400;line-height:1;letter-spacing:-2px;margin-bottom:32px;overflow:hidden}
.hero-h1 .line{display:block;opacity:0;animation:slideUp .9s var(--ease) forwards}
.hero-h1 .line:nth-child(1){animation-delay:.7s}
.hero-h1 .line:nth-child(2){animation-delay:.85s}
.hero-h1 .line i{font-style:italic;color:var(--gold2)}
.hero-sub{font-size:15px;color:var(--w3);max-width:500px;line-height:1.8;margin-bottom:40px;opacity:0;animation:slideUp .8s var(--ease) 1.1s forwards}
.hero-cta{display:flex;align-items:center;gap:24px;opacity:0;animation:slideUp .8s var(--ease) 1.3s forwards}
.cta-main{padding:18px 48px;background:var(--gold);color:var(--c1);font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;transition:all .4s var(--ease);position:relative;overflow:hidden}
.cta-main::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transition:left .6s}
.cta-main:hover::before{left:100%}
.cta-main:hover{background:var(--gold2);transform:translateY(-2px);box-shadow:0 20px 60px rgba(184,150,62,.2)}
.cta-line{display:flex;align-items:center;gap:12px;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--w3);transition:color .3s}
.cta-line:hover{color:var(--gold)}
.cta-line::after{content:'→';transition:transform .3s}
.cta-line:hover::after{transform:translateX(6px)}
body[dir="rtl"] .cta-line::after{content:'←'}
body[dir="rtl"] .cta-line:hover::after{transform:translateX(-6px)}

/* Hero scroll indicator */
.scroll-ind{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;z-index:2;opacity:0;animation:slideUp .8s var(--ease) 1.6s forwards}
.scroll-line{width:1px;height:40px;background:linear-gradient(var(--gold),transparent);animation:scrollPulse 2s ease infinite}
@keyframes scrollPulse{0%,100%{opacity:.3;transform:scaleY(.6)}50%{opacity:1;transform:scaleY(1)}}
.scroll-text{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--w4)}

@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

/*═══ SECTION ═══*/
.sec{max-width:1600px;margin:0 auto;padding:140px 80px}
.sec-sm{padding:100px 80px}
.eyebrow{font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-bottom:16px}
.sec-h{font-family:var(--serif);font-size:clamp(32px,4vw,56px);font-weight:400;line-height:1.15;letter-spacing:-1px}
.sec-h i{font-style:italic;color:var(--gold2)}
.sec-desc{font-size:14px;color:var(--w3);max-width:480px;line-height:1.9;margin-top:16px}
.sec-top{display:flex;justify-content:space-between;align-items:flex-end;gap:40px;margin-bottom:64px;flex-wrap:wrap}

/*═══ EDITORIAL PROPERTY GRID ═══*/
.ed-grid{display:grid;gap:2px;grid-template-columns:repeat(12,1fr);grid-auto-rows:320px}
.ed-grid .pc:nth-child(1){grid-column:span 7;grid-row:span 2}
.ed-grid .pc:nth-child(2){grid-column:span 5}
.ed-grid .pc:nth-child(3){grid-column:span 5}
.ed-grid .pc:nth-child(4){grid-column:span 4}
.ed-grid .pc:nth-child(5){grid-column:span 4}
.ed-grid .pc:nth-child(6){grid-column:span 4}

.pc{position:relative;overflow:hidden;cursor:pointer;background:var(--c2)}
.pc-bg{position:absolute;inset:0;transition:transform .8s var(--ease)}
.pc:hover .pc-bg{transform:scale(1.06)}
.pc-over{position:absolute;inset:0;background:linear-gradient(transparent 20%,rgba(12,12,14,.75) 70%,rgba(12,12,14,.92));z-index:1;transition:background .5s}
.pc:hover .pc-over{background:linear-gradient(transparent 10%,rgba(12,12,14,.6) 60%,rgba(12,12,14,.85))}
.pc-content{position:absolute;bottom:0;left:0;right:0;padding:32px;z-index:2;transform:translateY(10px);transition:transform .5s var(--ease)}
.pc:hover .pc-content{transform:translateY(0)}
.pc-type{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.pc-title{font-family:var(--serif);font-size:22px;font-weight:400;margin-bottom:4px;line-height:1.3}
.pc-loc{font-size:11px;color:var(--w3);display:flex;align-items:center;gap:4px}
.pc-price{font-family:var(--serif);font-size:24px;color:var(--gold2);margin-top:12px;letter-spacing:1px}
.pc-details{display:flex;gap:20px;margin-top:14px;opacity:0;transform:translateY(10px);transition:all .4s var(--ease) .1s}
.pc:hover .pc-details{opacity:1;transform:translateY(0)}
.pc-det{font-size:11px;color:var(--w3);display:flex;align-items:center;gap:4px}
.pc-det::before{content:'';width:3px;height:3px;background:var(--gold);border-radius:50%}
.pc-tag{position:absolute;top:20px;left:20px;z-index:2;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:6px 16px;backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1)}
body[dir="rtl"] .pc-tag{left:auto;right:20px}
.pc-tag.ft{background:rgba(184,150,62,.85);color:var(--c1);border-color:transparent}
.pc-tag.nw{background:rgba(255,255,255,.1);color:var(--w)}
.pc-tag.ht{background:rgba(220,60,60,.7);color:#fff;border-color:transparent}

/*═══ MARQUEE ═══*/
.marquee{overflow:hidden;padding:48px 0;border-top:1px solid var(--c3);border-bottom:1px solid var(--c3);margin:80px 0 0}
.marquee-track{display:flex;gap:64px;animation:marquee 30s linear infinite;width:max-content}
.marquee-item{font-family:var(--serif);font-size:48px;font-weight:400;color:var(--c4);white-space:nowrap;display:flex;align-items:center;gap:24px}
.marquee-item .dot{width:8px;height:8px;background:var(--gold);border-radius:50%}
@keyframes marquee{to{transform:translateX(-50%)}}

/*═══ SERVICES ═══*/
.srv-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--c3)}
.srv{background:var(--c1);padding:48px 36px;transition:background .5s var(--ease);position:relative;overflow:hidden}
.srv::before{content:'';position:absolute;bottom:0;left:0;width:0;height:2px;background:var(--gold);transition:width .6s var(--ease)}
.srv:hover::before{width:100%}
.srv:hover{background:var(--c2)}
.srv-num{font-family:var(--serif);font-size:48px;color:var(--c4);margin-bottom:20px;transition:color .4s}
.srv:hover .srv-num{color:var(--gold-a);color:var(--gold)}
.srv-t{font-family:var(--serif);font-size:22px;margin-bottom:10px}
.srv-d{font-size:12.5px;color:var(--w4);line-height:1.8}

/*═══ STATS BAND ═══*/
.stats-band{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--c3);margin:0}
.stat-b{background:var(--c1);padding:56px 40px;text-align:center}
.stat-n{font-family:var(--serif);font-size:56px;color:var(--gold2);letter-spacing:-2px}
.stat-l{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--w4);margin-top:8px}

/*═══ AREAS — HORIZONTAL SCROLL ═══*/
.areas-scroll{display:flex;gap:16px;overflow-x:auto;padding:0 80px 24px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.areas-scroll::-webkit-scrollbar{display:none}
.ar-card{min-width:340px;height:440px;position:relative;overflow:hidden;scroll-snap-align:start;flex-shrink:0;cursor:pointer}
.ar-card:first-child{min-width:500px}
.ar-bg{width:100%;height:100%;object-fit:cover;transition:transform .7s var(--ease)}
.ar-card:hover .ar-bg{transform:scale(1.05)}
.ar-over{position:absolute;inset:0;background:linear-gradient(transparent 40%,rgba(12,12,14,.9));z-index:1}
.ar-info{position:absolute;bottom:32px;left:32px;z-index:2}
body[dir="rtl"] .ar-info{left:auto;right:32px}
.ar-name{font-family:var(--serif);font-size:28px;margin-bottom:4px}
.ar-count{font-size:11px;color:var(--gold);letter-spacing:2px}

/*═══ TESTIMONIALS — EDITORIAL ═══*/
.test-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:var(--c3)}
.tst{background:var(--c1);padding:48px;display:flex;flex-direction:column}
.tst-quote{font-family:var(--serif);font-size:72px;color:var(--gold);line-height:.8;margin-bottom:16px}
.tst-text{font-family:var(--serif);font-size:18px;font-style:italic;line-height:1.8;color:var(--w2);flex:1}
.tst-author{margin-top:28px;padding-top:20px;border-top:1px solid var(--c3)}
.tst-name{font-size:13px;font-weight:600;letter-spacing:1px}
.tst-role{font-size:11px;color:var(--w4);margin-top:2px}

/*═══ CTA ═══*/
.cta-full{padding:140px 80px;text-align:center;position:relative;overflow:hidden}
.cta-full::before{content:'';position:absolute;top:50%;left:50%;width:600px;height:600px;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(184,150,62,.06),transparent 70%);border-radius:50%}
.cta-h{font-family:var(--serif);font-size:clamp(36px,5vw,64px);max-width:700px;margin:0 auto 20px;line-height:1.15}
.cta-p{font-size:14px;color:var(--w3);max-width:440px;margin:0 auto 36px;line-height:1.8}

/*═══ FOOTER ═══*/
.ft{border-top:1px solid var(--c3);padding:80px 80px 32px;max-width:1600px;margin:0 auto}
.ft-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:64px}
.ft-brand{font-family:var(--serif);font-size:24px;letter-spacing:6px;color:var(--gold2);margin-bottom:16px}
.ft-desc{font-size:13px;color:var(--w4);line-height:1.8;max-width:300px}
.ft-col h5{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:20px}
.ft-col a{display:block;font-size:13px;color:var(--w4);padding:5px 0;transition:color .3s,padding .3s}
.ft-col a:hover{color:var(--gold);padding-inline-start:8px}
.ft-bottom{margin-top:60px;padding-top:24px;border-top:1px solid var(--c3);display:flex;justify-content:space-between;font-size:11px;color:var(--w4);letter-spacing:1px}

/*═══ PAGES ═══*/
.pg{display:none}.pg.on{display:block}

/*═══ ALL PROPS PAGE ═══*/
.props-page-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.props-page-grid .pc{min-height:400px}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:40px}
.f-chip{padding:10px 24px;font-size:11px;letter-spacing:2px;text-transform:uppercase;border:1px solid var(--c4);color:var(--w4);transition:all .3s}
.f-chip:hover,.f-chip.on{border-color:var(--gold);color:var(--gold);background:var(--gold-a)}

/*═══ CONTACT ═══*/
.cnt-split{display:grid;grid-template-columns:1fr 1fr;min-height:80vh}
.cnt-left{background:var(--c2);padding:120px 80px 80px;display:flex;flex-direction:column;justify-content:center}
.cnt-right{padding:120px 80px 80px;display:flex;flex-direction:column;justify-content:center;gap:20px}
.ci{padding:14px 0;border-bottom:1px solid var(--c3);display:flex;align-items:center;gap:16px;font-size:14px;color:var(--w2)}
.ci-ic{font-size:20px;width:32px;text-align:center}
.cnt-input{padding:16px 0;background:transparent;border:none;border-bottom:1px solid var(--c4);color:var(--w);font-size:14px;font-family:inherit;transition:border-color .3s;width:100%}
.cnt-input:focus{outline:none;border-color:var(--gold)}
.cnt-input::placeholder{color:var(--w4)}
textarea.cnt-input{resize:none;min-height:100px;border:1px solid var(--c4);padding:16px;margin-top:8px}
textarea.cnt-input:focus{border-color:var(--gold)}

/*═══ ABOUT ═══*/
.abt-hero{padding:200px 80px 100px;display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;max-width:1600px;margin:0 auto}
.abt-img{height:500px;background:var(--c2);border:1px solid var(--c3);display:flex;align-items:center;justify-content:center;font-size:120px;position:relative;overflow:hidden}
.abt-img::before{content:'';position:absolute;inset:0;border:1px solid rgba(184,150,62,.1);margin:16px}

/*═══ RESPONSIVE ═══*/
@media(max-width:1024px){
  .ed-grid{grid-template-columns:1fr 1fr;grid-auto-rows:280px}
  .ed-grid .pc:nth-child(1){grid-column:span 2;grid-row:span 1}
  .ed-grid .pc:nth-child(n){grid-column:span 1}
  .srv-row{grid-template-columns:1fr 1fr}
  .test-row{grid-template-columns:1fr}
  .stats-band{grid-template-columns:1fr 1fr}
  .ft-grid{grid-template-columns:1fr 1fr}
  .props-page-grid{grid-template-columns:1fr 1fr}
  .cnt-split{grid-template-columns:1fr}
  .abt-hero{grid-template-columns:1fr;padding:160px 40px 60px}
}
@media(max-width:768px){
  .hd{padding:16px 20px}.hd.solid{padding:12px 20px}
  .hd-nav{display:none}
  .hd-menu{display:flex}
  .hero-content{padding:0 24px 60px}
  .sec,.sec-sm{padding:80px 24px}
  .cta-full{padding:80px 24px}
  .ft{padding:60px 24px 24px}
  .ft-grid{grid-template-columns:1fr;gap:32px}
  .ed-grid{grid-template-columns:1fr;grid-auto-rows:300px}
  .ed-grid .pc:nth-child(1){grid-column:span 1}
  .srv-row{grid-template-columns:1fr}
  .stats-band{grid-template-columns:1fr 1fr}
  .props-page-grid{grid-template-columns:1fr}
  .areas-scroll{padding:0 24px 20px}
  .ar-card{min-width:280px;height:360px}
  .ar-card:first-child{min-width:280px}
  .cnt-left,.cnt-right{padding:80px 24px 40px}
  .marquee-item{font-size:32px}
  .ft-bottom{flex-direction:column;gap:8px;text-align:center}
}
</style>
</head>
<body dir="ltr" id="app">

<!-- LOADER -->
<div class="loader" id="loader"><div class="loader-text">DAREK</div><div class="loader-bar"><div class="loader-fill"></div></div></div>

<!-- CURSOR -->
<div class="cursor" id="cursor"></div>

<!-- MOBILE NAV -->
<div class="mnav" id="mnav">
  <button class="mnav-close" onclick="closeMnav()">✕</button>
  <button class="hd-link" onclick="go('home');closeMnav()" data-i="nav_home"></button>
  <button class="hd-link" onclick="go('properties');closeMnav()" data-i="nav_props"></button>
  <button class="hd-link" onclick="go('about');closeMnav()" data-i="nav_about"></button>
  <button class="hd-link" onclick="go('contact');closeMnav()" data-i="nav_contact"></button>
  <button class="hd-lang" onclick="switchLang();closeMnav()" id="mLang"></button>

  const m={home:'nHome',properties:'nProps',about:'nAbout',contact:'nContact'};
  if(m[p])document.getElementById(m[p]).classList.add('on');
  window.scrollTo({top:0,behavior:'smooth'});
}

// MOBILE
function openMnav(){document.getElementById('mnav').classList.add('open')}
function closeMnav(){document.getElementById('mnav').classList.remove('open')}

// HEADER
window.addEventListener('scroll',()=>document.getElementById('hd').classList.toggle('solid',scrollY>60));

// CURSOR
const cur=document.getElementById('cursor');
document.addEventListener('mousemove',e=>{cur.style.left=e.clientX+'px';cur.style.top=e.clientY+'px'});
document.querySelectorAll('button,a,.pc,.ar-card').forEach(el=>{
  el.addEventListener('mouseenter',()=>cur.classList.add('hover'));
  el.addEventListener('mouseleave',()=>cur.classList.remove('hover'));
});

// LOADER
window.addEventListener('load',()=>setTimeout(()=>document.getElementById('loader').classList.add('hide'),2200));

// INIT
apply();
</script>
</body>
</html>
